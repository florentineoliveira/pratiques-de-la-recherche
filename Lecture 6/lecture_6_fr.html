&amp;nbsp;

Les méthodes abordées précédemment (régression OLS simple, variable instrumentale) concernaient des données en **coupe instantanée** (*cross-section*) ou des échantillons répétés dans le temps (*repeated cross-section*) sans suivi individuel

&amp;nbsp;

Cette séance: données de panel   
  - Effets fixes individus (très rapidement)   
  - Méthode des doubles différences   


---
# Données de Pannel et Effet Fixe Individu

&amp;nbsp;

Dans un jeu de données de panel, on observe:
- de multiples observations `\(t\)` (année, trimestre, etc)
- pour de multiples individus `\(i\)` 

Le modèle de régression devient alors, pour tout &lt;span style="color:#27b072"&gt;individu&lt;/span&gt; `\(\color{#27b072}{i}\)` et &lt;span style="color:#9e5188"&gt;période&lt;/span&gt; `\(\color{#9e5188}{t}\)`:

`$$y_{\color{#27b072}{i} \color{#9e5188}{t}} = \alpha + \beta D_{\color{#27b072}{i} \color{#9e5188}{t}} + \varepsilon_{\color{#27b072}{i} \color{#9e5188}{t}}$$`
où:
- `\(y_{it}\)` est l'outcome d'intérêt
- `\(D_{it}\)` le traitement qui vaut 1 si l'individu `\(i\)` est traité, 0 sinon
- `\(\varepsilon_{it}\)` le terme d'erreur


---
# Effet fixe

En incluant un **effet fixe individu** dans notre modèle de régression, on contrôle par tous les facteurs individuels **constants au cours du temps**, à la fois observables et &lt;span style="color:#dd0747"&gt;**non-observables**&lt;/span&gt;

  `\(\implies\)` on utilise la variation intra-individuelle (variation pour un même individu dans le temps, *within*).

Le modèle s'écrit:
`$$y_{it} = \alpha + \beta D_{it} + \color{#dd0747}\alpha_{\color{#27b072}{i}} +  \varepsilon_{it}$$`

---
# Exemple: effet de la taille de la ville sur le salaire

&amp;nbsp;
  
Quel est l'effet de la taille de la ville sur le salaire (*urban wage premium*) ? 

--

Pourquoi ne peut-on pas déduire l'effet de la taille de la ville en comparant le salaire des individus qui vivent en ville au salaire des individus qui vivent dans des zones peu densément peuplées?

--

**Endogeneous sorting**: le lieu d'habitation n'est pas aléatoire (eg: les individus les plus diplômés choisissent souvent de vivre dans de grandes villes!)

--

**Solution**: Effet fixe individu! Cela veut dire que l'on exploite pour l'identification la variation de lieu de résidence individuelle, autrement dit uniquement sur les individus qui sont amenés à déménager (*movers*).

--

**Problème**: les effets fixes individu ne nous permettent pas de contrôler pour les caractéristiques des individus qui varient dans le temps...


---
# Méthode des Doubles Différences

&amp;nbsp;

Méthode des doubles-différences s'appuie sur des **expériences naturelles**, i.e. une politique ou un changement institutionnel qui induit un traitement pour un groupe donné à un moment précis

&amp;nbsp;

Contrairement aux "vraies expériences" où les groupes de contrôle et de traitement sont constitués par assignation aléatoire, les groupes sont déterminées par le changement de politique particulier.

&amp;nbsp;

Les données de panel et la méthode des DiD permettent de tenir compte de cette sélection sur des caractéristiques non-observables, à condition que ces &lt;span style="color:#dd0747"&gt;**caractéristiques soient constantes dans le temps**&lt;/span&gt;



---
# Intuition

&amp;nbsp;


Si, avant la mise en place du traitement, le groupe d'individus traités et contrôles diffèrent, cela est probablement en partie dû à des éléments non observés (biais de sélection)

  `\(\implies\)` on utilise cette différence pré-traitement comme référence pour "corriger" le biais initial

&amp;nbsp;

--

On compare donc la différence entre les deux groupes (première différence), avant et après traitement (deuxième différence).

  - en soustrayant la différence initiale, on obtient l'effet 'net' du traitement
  
&amp;nbsp;

  
Cela suppose que l’**hypothèse de tendance parallèle** est valable: en l’absence de politique (traitement), l’écart entre les deux groupes serait resté constant dans le temps.




---
# Estimation  

Supposons qu'il y a:      
- `\(t\)` périodes `\(\in \{1,T\}\)`   
- un groupe d'individus `\(i \in [\![1;n]\!]\)` traités `\(D_i = 1\)`, et non traités `\(D_i = 0\)`   
- les individus sont traités en `\(g_i\)`   

&amp;nbsp;

Si `\(T=n=2\)`, le modèle s'écrit: 

`$$Y_{it} = \alpha + \color{#dd0747}{\beta_{DiD}} (D_i \times Post_{t}) + \delta D_i + \eta Post_t + \varepsilon_{it}$$`
Généralisation d'un modèle à plusieurs périodes:

`$$Y_{it} = \color{#dd0747}{\beta^{TWFE}} D_{it} + \delta_i + \gamma_t +  \varepsilon_{it}$$`
avec `\(D_{it} = \mathbb{1}\{t \ge g_i\}\)`


---
# Hypothèses d'identification

&lt;span style="color:#9933FF"&gt; **Parallel trends**&lt;/span&gt; 
- &lt;span style="color:#9933FF"&gt;En l'absence de traitement, l'outcome moyen des individus traités aurait évolué de la même manière que celui des individus non traités&lt;/span&gt; 
- &lt;span style="color:#9933FF"&gt; Formellement,&lt;/span&gt;  `\(\color{#9933FF}{\underbrace{\mathbb{E}[Y_{i2}(0) - Y_{i1}(0) | D_i = 1 ]}_{\text{Changement de Y(0) pour les traités}}  =  \underbrace{ \mathbb{E}[Y_{i2}(0) - Y_{i1}(0) | D_i = 0]}_{\text{Changement de Y(0) pour les contrôles}}}\)` 
- &lt;span style="color:#9933FF"&gt; Ou encore,&lt;/span&gt;  `\(\color{#9933FF}{\underbrace{\mathbb{E}[Y_{i2}(0) | D_i = 1 ] - \mathbb{E}[Y_{i2}(0) | D_i = 0 ]}_{\text{Biais de sélection en période 2}}  =  \underbrace{\mathbb{E}[Y_{i1}(0) | D_i = 1 ] - \mathbb{E}[Y_{i1}(0) | D_i = 0 ]}_{\text{Biais de sélection en période 1}}}\)` 


&lt;span style="color:#9933FF"&gt; **Absence d'anticipation**&lt;/span&gt; 
- &lt;span style="color:#9933FF"&gt;Le traitement n'a pas d'effet causal avant qu'il ne soit implanté&lt;/span&gt; 
- &lt;span style="color:#9933FF"&gt; Formellement,&lt;/span&gt;  `\(\color{#9933FF}{Y_{i1}(1) = Y_{i1}(0)}\)` 


---
# Event Study

On peut aussi estimer un effet dynamique, par période relative à l'adoption du traitement:

`$$Y_{it} = \sum_{k \neq -1} \color{#dd0747}{\beta_{k}} \mathbb{1}\{k = t - g_i \} + \delta_i + \gamma_t + \varepsilon_{it}$$`

où `\(k = t - g_i\)` est le **temps relatif à l'adoption** (*time to treatment*)

&amp;nbsp;

Pour &lt;span style="color:#dd0747"&gt;**tester les tendances parallèles**&lt;/span&gt;, on vérifie que pur `\(k &lt; -1\)`, le traitement n'est pas encore actif `\(\hat{\beta}_k \approx 0\)`

Les coefficients `\(\hat{\beta}_k\)` permettent d'&lt;span style="color:#dd0747"&gt;**estimer la dynamique de l'effet**&lt;/span&gt;: pour `\(k \geq 0\)`, `\(\hat{\beta}_k\)` capture l'effet du traitement `\(k\)` périodes après l'adoption

NB: La période `\(k = -1\)` est normalisée à zéro par construction (catégorie de référence)


**Implémentation sur `R`** : `feols(y ~ i(time_to_treat, ref = -1) | id + year, data = data)`

# Solution : Card and Krueger (1994)

1) Importez les données sur `R`et stockez dans `df`. Créer les variables:
  - `fte_before` (équivalent temps-plein)  `= empft + nmgrs + (0.5*emppt)`
  - `fte_after = empft2 + nmgrs2 + (0.5*emppt2)`
  - Ré-encoder `state` de pour que sa valeur soit "Pennsylvanie" si state = 0 et "New Jersey" si state = 1



``` r
df = readRDS("data/ck1994.rds") %&gt;% 
  mutate(fte_before = empft + nmgrs + (0.5*emppt),
         fte_after = empft2 + nmgrs2 + (0.5*emppt2),
         state = ifelse(state == 0, "Pennsylvanie", "New Jersey"))
```

# Solution: Medicaid Expansion

1) Importez les données (`county_mortality_data_cleaned.rds`) et stockez dans `data`. Créez les variables suivantes :
   - `treat` : vaut 1 si l'état a adopté Medicaid avant 2019 ou en 2019, 0 sinon
   - `treat_year` : année d'adoption de l'état, égal à 0 si jamais adoptant ou adoptant après 2019
   - `time_to_treat` : nombre d'années par rapport à l'adoption ( `\(= t - g\)` ), égal à `\(-\infty\)` pour les non-adoptants
   - `post` : vaut 1 si l'année de traitement est supérieure ou égale à 2014, 0 sinon
   

``` r
data = readRDS("data/county_mortality_data_cleaned.rds") %&gt;%
  mutate(treat = ifelse(!is.na(yaca) &amp; yaca &lt;= 2019, 1, 0),
         treat_year = ifelse(!is.na(yaca) &amp; yaca &lt;= 2019, yaca, 0),
         time_to_treat = ifelse(treat == 1, year - treat_year, -Inf),
         post = ifelse(year &gt;= 2014, 1, 0))
```

4) Sur `data_2x2`, calculez le taux de mortalité moyen par groupe (adoptants 2014 / non-adoptants) et par période (avant 2014 / après 2014). Calculez l'estimateur DiD 2×2 à la main puis par régression OLS avec `feols()`. Interprétez.

  filter(treat_year %in% c(0, 2014)) 

did = data_2x2 %&gt;% 
  group_by(treat_year, post) %&gt;%
  summarise(mortality = weighted.mean(crude_rate_20_64, set_wt)) %&gt;%
  ungroup() 

did_estimate = (did[did$treat_year == 2014 &amp; did$post == 1, "mortality"] -  did[did$treat_year == 2014 &amp; did$post == 0, "mortality"]) - 
  (did[did$treat_year == 0 &amp; did$post == 1, "mortality"] - did[did$treat_year == 0 &amp; did$post == 0, "mortality"])

did_estimate_ols = summary(feols(crude_rate_20_64 ~ treat*post, data = data_2x2, weights = ~set_wt))$coeftable["treat:post", "Estimate"]

# Solution: Medicaid Expansion

6) Réalisez une **event-study** en estimant : `crude_rate_20_64 ~ i(time_to_treat, ref = -1) | county_code + year`
   Représentez graphiquement les coefficients `\(\hat{\beta}_k\)` avec leurs intervalles de confiance à 95%.   
   Que nous apprend ce graphique sur l'hypothèse de tendances parallèles ? Sur l'effet du traitement?


``` r
es = feols(crude_rate_20_64 ~ i(time_to_treat, treat, ref = -1) | county_code + year, data = data, weights = ~ set_wt, cluster = ~ county_code) 

coefs_es = broom::tidy(es, conf.int = TRUE) %&gt;%
    filter(str_detect(term, "time_to_treat")) %&gt;%
    mutate(k = as.numeric(str_extract(term, "-?[0-9]+"))) %&gt;%
    bind_rows(tibble(k = -1, estimate = 0, conf.low = 0, conf.high = 0)) %&gt;%
    arrange(k)

ggplot(coefs_es, aes(x = k, y = estimate)) +
    geom_hline(yintercept = 0, linetype = "dashed", color = "gray50", linewidth = 0.8) +
    geom_vline(xintercept = -0.5, linetype = "dotted", color = "gray50", linewidth = 0.8) +
    geom_ribbon(aes(ymin = conf.low, ymax = conf.high),
                fill = "#f8cdda", alpha = 0.6) +
    geom_line(color = "#D04E59", linewidth = 1) +
    geom_point(color = "#D04E59", size = 2.5) +
    geom_point(data = filter(coefs_es, k == -1),
               shape = 21, fill = "white", color = "#D04E59", size = 3) +
    scale_x_continuous(breaks = seq(-10, 5, by = 1)) +
    labs(
        x = "Années par rapport à l'adoption (k)",
        y = "Coefficient estimé\n(pour 100 000)"

    theme_bw() +
    theme(
        text             = element_text(family = "Palatino"),
        panel.grid.minor = element_blank(),
        panel.grid.major = element_line(color = "gray90"),
        axis.title.y     = element_text(hjust = 0.5, vjust = 0.5)
    )

Les estimations obtenues sont purement illustratives:
- nos données agrégées au niveau comté diluent l'effet en incluant des populations non éligibles à Medicaid

# Recap: Méthode des Doubles Différences

**Data**: Données de pannel 

&lt;span style="color:#9933FF"&gt;**Hypothèses d'identification**:  &lt;/span&gt;
- &lt;span style="color:#9933FF"&gt; **Parallel Trends**: en l'absence du traitement, les groupes traités et contrôles auraient évolué de manière similaire ( `\(\color{#9933FF}{\mathbb{E}[Y_{i2}(0) - Y_{i1}(0) | D_i = 1 ]  =  \mathbb{E}[Y_{i2}(0) - Y_{i1}(0) | D_i = 0]}\)` ) &lt;/span&gt;
- &lt;span style="color:#9933FF"&gt; **Absence d'anticipation**: le traitement n'a pas d'effet avant sa mise en place `\(\color{#9933FF}{Y_{i1}(1) = Y_{i1}(0)}\)` &lt;/span&gt;

**Modèle TWFE** : pour tout individu `\(i\)` et période `\(t\)`,
`$$Y_{it} = \beta D_{it} + \delta_i + \gamma_t +  \varepsilon_{it}$$`
**Implémentation sur `R`**:  package `fixest`
- `feols(y ~ i(post, treat, ref = 0) | FE, data = data)`
- de Chaisemartin and d'Hautefeuille (2020), package R `DIDmultiplegtDYN`
- Callaway and Sant'Anna (2021), package R `did`
- Sun and Abraham (2020), `sunab()` argument in `fixest`
- Borusyak, Jaravel and Spiess (2024), package R `didimputation`
